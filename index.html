<!DOCTYPE html>
<html class="h-full overflow-hidden">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Recorder</title>
        <link rel="stylesheet" href="./style.css">
    </head>

    <body class="h-full overflow-hidden">
        <div id="main-button" class="h-full text-4xl bg-neutral-100 text-center select-none cursor-pointer flex flex-col justify-center [&>*>svg]:inline-block">
            <div id="main-button--record">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path d="M0 0h24v24H0z" fill="none" />
                    <path fill="currentColor" d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-3 3a3 3 0 0 1-3-3V5a3 3 0 0 1 3-3m7 9c0 3.53-2.61 6.44-6 6.93V21h-2v-3.07c-3.39-.49-6-3.4-6-6.93h2a5 5 0 0 0 5 5a5 5 0 0 0 5-5z" />
                </svg>
                Record<span class="text-xl text-neutral-600"> [Enter]</span>
            </div>
            <div id="main-button--recording" class="hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path d="M0 0h24v24H0z" fill="none" />
                    <path fill="currentColor" d="M6 18V6h12v12z" />
                </svg>
                Recording<span class="text-xl text-neutral-600"> [Enter]</span>
            </div>
        </div>
        <div class="absolute top-[60%] left-[50%]">
            <div id="audio-container" class="-translate-x-1/2"></div>
        </div>
        <script type="module" src="./main.ts"></script>
    </body>

</html>
